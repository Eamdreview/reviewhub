name: Daily Affiliate Research

on:
  schedule:
    # 05:00 UTC = 07:00 Africa/Cairo (UTC+2). Runs every morning.
    - cron: "0 5 * * *"
  workflow_dispatch:        # lets you trigger a run manually from the Actions tab
    inputs:
      dry_run:
        description: "Run offline on fake data (no keys needed)"
        type: boolean
        default: false

permissions:
  contents: write           # needed to commit the daily report back to the repo

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run research pipeline
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          PRODUCTHUNT_TOKEN: ${{ secrets.PRODUCTHUNT_TOKEN }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_SECRET: ${{ secrets.REDDIT_SECRET }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GOOGLE_CSE_KEY: ${{ secrets.GOOGLE_CSE_KEY }}
          GOOGLE_CSE_ID: ${{ secrets.GOOGLE_CSE_ID }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python -m src.main --dry-run
          else
            python -m src.main
          fi

      - name: Commit the daily report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          if git diff --staged --quiet; then
            echo "No new report to commit."
          else
            git commit -m "Daily affiliate research report ($(date -u +%Y-%m-%d))"
            git push
          fi
