name: Weekly Affiliate Intelligence

on:
  schedule:
    # 05:00 UTC Friday = 07:00 Africa/Cairo (UTC+2). Runs once a week.
    - cron: "0 5 * * 5"
  workflow_dispatch:        # lets you trigger a run manually from the Actions tab
    inputs:
      dry_run:
        description: "Run offline on fake data (no keys needed)"
        type: boolean
        default: false
  push:
    # On-demand run without the Actions UI: commit a marker file under
    # .github/triggers/weekly-* and the pipeline runs once for that push.
    # Scoped to that path so ordinary code pushes never trigger a paid run.
    branches: [main]
    paths:
      - ".github/triggers/weekly-*"

permissions:
  contents: write           # needed to commit the weekly report back to the repo

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run intelligence pipeline
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          PRODUCTHUNT_TOKEN: ${{ secrets.PRODUCTHUNT_TOKEN }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_SECRET: ${{ secrets.REDDIT_SECRET }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GOOGLE_CSE_KEY: ${{ secrets.GOOGLE_CSE_KEY }}
          GOOGLE_CSE_ID: ${{ secrets.GOOGLE_CSE_ID }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python -m src.main --dry-run
          else
            python -m src.main
          fi

      - name: Commit the weekly report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ data/history data/knowledge 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No new report to commit."
            exit 0
          fi
          git commit -m "Weekly affiliate intelligence report ($(date -u +%Y-%m-%d))"
          # Sync + rebase + retry: the discovery-debug workflow can push to main
          # on the same event, so a bare push may hit a non-fast-forward.
          for i in 1 2 3; do
            git fetch origin main || true
            git rebase origin/main || git rebase -X ours origin/main || git rebase --abort || true
            if git push origin HEAD:main; then
              echo "Pushed report on attempt $i."
              exit 0
            fi
            echo "Non-fast-forward, retrying ($i/3)…"; sleep $((i * 3))
          done
          echo "Failed to push the report after 3 attempts." >&2
          exit 1
